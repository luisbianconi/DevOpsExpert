frontend:
  image: luisbianconi/giropops-senhas:7.0
  replicas: 1
  resources:
    limits:
      cpu: 250m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

redis:
  image: redis:7-alpine
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

ingress:
  enabled: true
  className: nginx
  host: giropops.luisbianconi.com
  tls: true
  tlsSecret: giropops-tls
